<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>專案管理 AI Agent</title>
  <style>
    :root {
      --ink: #17202a;
      --muted: #667085;
      --line: #e4e7ec;
      --surface: #fff;
      --canvas: #f4f6f8;
      --brand: #215c4b;
      --brand-dark: #174438;
      --accent: #d8a646;
      --danger: #b42318;
      --shadow: 0 14px 36px rgba(23, 32, 42, .08);
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      color: var(--ink);
      background: var(--canvas);
      font-family: "Microsoft JhengHei", "Noto Sans TC", sans-serif;
    }

    button, input, textarea, select { font: inherit; }
    button { cursor: pointer; }

    .shell {
      width: min(1440px, calc(100% - 40px));
      margin: 0 auto;
      padding: 34px 0 56px;
    }

    header {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 24px;
      margin-bottom: 28px;
    }

    .eyebrow {
      color: var(--brand);
      font-size: 13px;
      font-weight: 800;
      letter-spacing: .12em;
      text-transform: uppercase;
    }

    h1 {
      margin: 8px 0 6px;
      font-family: Georgia, "Noto Serif TC", serif;
      font-size: clamp(34px, 5vw, 58px);
      line-height: 1;
      letter-spacing: -.04em;
    }

    .subtitle { margin: 0; color: var(--muted); }
    .header-actions { display: flex; align-items: center; gap: 12px; }
    .user-info { color: var(--muted); font-size: 13px; text-align: right; }
    .user-info strong { display: block; max-width: 240px; overflow: hidden; color: var(--ink); text-overflow: ellipsis; }

    .primary, .secondary, .icon-button {
      border: 0;
      border-radius: 10px;
      transition: .18s ease;
    }

    .primary {
      padding: 12px 18px;
      color: #fff;
      background: var(--brand);
      font-weight: 700;
      box-shadow: 0 8px 18px rgba(33, 92, 75, .18);
    }
    .primary:hover { background: var(--brand-dark); transform: translateY(-1px); }
    .secondary {
      padding: 11px 16px;
      color: var(--ink);
      background: #fff;
      border: 1px solid var(--line);
      font-weight: 700;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 14px;
      margin-bottom: 18px;
    }

    .stat {
      padding: 18px 20px;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: var(--surface);
    }
    .stat strong { display: block; margin-top: 4px; font: 700 30px Georgia, serif; }
    .stat span { color: var(--muted); font-size: 13px; }

    .toolbar {
      display: flex;
      gap: 12px;
      padding: 16px;
      margin-bottom: 16px;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: var(--surface);
    }
    .toolbar input, .toolbar select {
      min-height: 42px;
      padding: 0 12px;
      border: 1px solid var(--line);
      border-radius: 9px;
      color: var(--ink);
      background: #fff;
      outline: none;
    }
    .toolbar input { flex: 1; }
    .toolbar .owner-filter { min-width: 160px; }
    .toolbar .add-owner { white-space: nowrap; }
    .toolbar input:focus, .toolbar select:focus,
    .field input:focus, .field textarea:focus, .field select:focus {
      border-color: var(--brand);
      box-shadow: 0 0 0 3px rgba(33, 92, 75, .1);
    }

    .table-wrap {
      overflow: auto;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: var(--surface);
      box-shadow: var(--shadow);
    }

    table { width: 100%; min-width: 1100px; border-collapse: collapse; }
    th {
      padding: 13px 15px;
      color: var(--muted);
      background: #fafafa;
      border-bottom: 1px solid var(--line);
      font-size: 12px;
      text-align: left;
      letter-spacing: .05em;
      white-space: nowrap;
    }
    td {
      max-width: 240px;
      padding: 16px 15px;
      border-bottom: 1px solid var(--line);
      vertical-align: top;
      font-size: 14px;
    }
    tr:last-child td { border-bottom: 0; }
    tbody tr:hover { background: #fbfcfb; }
    .project-name { font-weight: 800; }
    .cell-text {
      overflow: hidden;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      line-height: 1.55;
      white-space: pre-wrap;
    }

    .status-select {
      width: 106px;
      padding: 7px 8px;
      border: 1px solid transparent;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 800;
      outline: none;
    }
    .status-not-started { color: #475467; background: #f2f4f7; }
    .status-in-progress { color: #175cd3; background: #eff8ff; }
    .status-maintenance { color: #93370d; background: #fffaeb; }
    .status-completed { color: #067647; background: #ecfdf3; }

    .actions { display: flex; gap: 6px; }
    .icon-button {
      padding: 7px 10px;
      color: var(--brand);
      background: #edf5f2;
      font-size: 13px;
      font-weight: 700;
    }
    .icon-button.danger { color: var(--danger); background: #fef3f2; }

    .empty {
      padding: 70px 24px;
      text-align: center;
      color: var(--muted);
    }
    .empty strong { display: block; margin-bottom: 8px; color: var(--ink); font-size: 20px; }

    dialog {
      width: min(760px, calc(100% - 32px));
      padding: 0;
      border: 0;
      border-radius: 18px;
      box-shadow: 0 30px 80px rgba(23, 32, 42, .25);
    }
    dialog::backdrop { background: rgba(23, 32, 42, .48); backdrop-filter: blur(3px); }
    .dialog-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 22px 24px;
      border-bottom: 1px solid var(--line);
    }
    .dialog-head h2 { margin: 0; font: 700 25px Georgia, "Noto Serif TC", serif; }
    .close {
      width: 36px;
      height: 36px;
      border: 0;
      border-radius: 50%;
      background: #f2f4f7;
      font-size: 22px;
    }
    form { padding: 24px; }
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; }
    .field.full { grid-column: 1 / -1; }
    .field label { display: block; margin-bottom: 7px; font-size: 13px; font-weight: 800; }
    .field input, .field textarea, .field select {
      width: 100%;
      padding: 11px 12px;
      border: 1px solid var(--line);
      border-radius: 9px;
      outline: none;
    }
    .field textarea { min-height: 105px; resize: vertical; line-height: 1.5; }
    .form-actions {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      padding-top: 22px;
    }
    .hint { margin-top: 6px; color: var(--muted); font-size: 12px; }

    .toast {
      position: fixed;
      right: 24px;
      bottom: 24px;
      padding: 13px 17px;
      border-radius: 10px;
      color: #fff;
      background: var(--ink);
      box-shadow: var(--shadow);
      opacity: 0;
      transform: translateY(12px);
      pointer-events: none;
      transition: .22s ease;
    }
    .toast.show { opacity: 1; transform: translateY(0); }

    .login-screen {
      position: fixed;
      z-index: 20;
      inset: 0;
      display: grid;
      place-items: center;
      padding: 24px;
      background:
        radial-gradient(circle at 20% 20%, rgba(216, 166, 70, .16), transparent 30%),
        linear-gradient(145deg, #173e34, #0f2923);
    }
    .login-screen[hidden] { display: none; }
    .login-card {
      width: min(430px, 100%);
      padding: 34px;
      border-radius: 20px;
      background: #fff;
      box-shadow: 0 28px 80px rgba(0, 0, 0, .25);
    }
    .login-card h2 { margin: 8px 0; font: 700 32px Georgia, "Noto Serif TC", serif; }
    .login-card p { margin: 0 0 24px; color: var(--muted); line-height: 1.6; }
    .login-card .field { margin-bottom: 16px; }
    .login-card .primary { width: 100%; margin-top: 4px; }
    .login-error { min-height: 20px; margin-top: 14px; color: var(--danger); font-size: 13px; }
    .loading {
      display: none;
      padding: 12px 16px;
      color: var(--muted);
      text-align: center;
    }
    .loading.show { display: block; }
    .owner-list {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 14px;
    }
    .owner-chip {
      padding: 7px 10px;
      border-radius: 999px;
      color: var(--brand);
      background: #edf5f2;
      font-size: 13px;
      font-weight: 700;
    }

    @media (max-width: 760px) {
      .shell { width: min(100% - 24px, 1440px); padding-top: 24px; }
      header { align-items: flex-start; flex-direction: column; }
      .header-actions { width: 100%; justify-content: space-between; }
      .stats { grid-template-columns: 1fr 1fr; }
      .toolbar { flex-direction: column; }
      .form-grid { grid-template-columns: 1fr; }
      .field.full { grid-column: auto; }
    }
  </style>
</head>
<body>
  <section class="login-screen" id="loginScreen">
    <form class="login-card" id="loginForm">
      <div class="eyebrow">Project Desk Cloud</div>
      <h2>登入專案管理</h2>
      <p>登入後即可在不同地點查看及同步更新專案。</p>
      <div class="field">
        <label for="loginEmail">Email</label>
        <input id="loginEmail" type="email" autocomplete="username" required>
      </div>
      <div class="field">
        <label for="loginPassword">密碼</label>
        <input id="loginPassword" type="password" autocomplete="current-password" required>
      </div>
      <button class="primary" id="loginButton" type="submit">登入</button>
      <div class="login-error" id="loginError"></div>
    </form>
  </section>

  <main class="shell">
    <header>
      <div>
        <div class="eyebrow">Project Desk</div>
        <h1>專案管理</h1>
        <p class="subtitle">集中記錄專案資料、交件日期與即時狀態。</p>
      </div>
      <div class="header-actions">
        <div class="user-info">
          已登入
          <strong id="userEmail"></strong>
        </div>
        <button class="secondary" id="logoutButton">登出</button>
        <button class="primary" id="addProject">＋ 新增專案</button>
      </div>
    </header>

    <section class="stats" aria-label="專案統計">
      <div class="stat"><span>全部專案</span><strong id="totalCount">0</strong></div>
      <div class="stat"><span>進行中</span><strong id="progressCount">0</strong></div>
      <div class="stat"><span>維護中</span><strong id="maintenanceCount">0</strong></div>
      <div class="stat"><span>已完成</span><strong id="completedCount">0</strong></div>
    </section>

    <section class="toolbar">
      <input id="searchInput" type="search" placeholder="搜尋專案名稱、負責人或內容">
      <select class="owner-filter" id="ownerFilter" aria-label="篩選專案負責人">
        <option value="">全部負責人</option>
      </select>
      <select id="statusFilter" aria-label="篩選狀態">
        <option value="">全部狀態</option>
        <option>未開始</option>
        <option>進行中</option>
        <option>維護中</option>
        <option>已完成</option>
      </select>
      <button class="secondary add-owner" id="addOwner">＋ 新增負責人</button>
    </section>

    <section class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>更新日期</th>
            <th>專案名稱</th>
            <th>專案負責人</th>
            <th>專案資料</th>
            <th>交件日期</th>
            <th>需求備註</th>
            <th>狀態</th>
            <th>操作</th>
          </tr>
        </thead>
        <tbody id="projectRows"></tbody>
      </table>
      <div class="empty" id="emptyState">
        <strong>還沒有專案</strong>
        點選「新增專案」建立第一筆資料。
      </div>
      <div class="loading" id="loadingState">正在同步雲端資料...</div>
    </section>
  </main>

  <dialog id="projectDialog">
    <div class="dialog-head">
      <h2 id="dialogTitle">新增專案</h2>
      <button class="close" type="button" id="closeDialog" aria-label="關閉">×</button>
    </div>
    <form id="projectForm">
      <input id="projectId" type="hidden">
      <div class="form-grid">
        <div class="field">
          <label for="projectName">專案名稱 *</label>
          <input id="projectName" required maxlength="100">
        </div>
        <div class="field">
          <label for="owner">專案負責人 *</label>
          <select id="owner" required>
            <option value="">請選擇負責人</option>
          </select>
        </div>
        <div class="field full">
          <label for="projectData">專案資料 *</label>
          <textarea id="projectData" required placeholder="輸入專案目標、相關連結或執行內容"></textarea>
        </div>
        <div class="field">
          <label for="dueDate">交件日期 *</label>
          <input id="dueDate" type="date" required>
        </div>
        <div class="field">
          <label for="status">狀態</label>
          <select id="status">
            <option>未開始</option>
            <option>進行中</option>
            <option>維護中</option>
            <option>已完成</option>
          </select>
        </div>
        <div class="field full">
          <label for="notes">需求備註</label>
          <textarea id="notes" placeholder="補充需求、注意事項或變更紀錄"></textarea>
          <div class="hint">每次儲存或變更狀態，都會自動更新「更新日期」。</div>
        </div>
      </div>
      <div class="form-actions">
        <button class="secondary" type="button" id="cancelDialog">取消</button>
        <button class="primary" type="submit">儲存專案</button>
      </div>
    </form>
  </dialog>

  <dialog id="ownerDialog">
    <div class="dialog-head">
      <h2>新增專案負責人</h2>
      <button class="close" type="button" id="closeOwnerDialog" aria-label="關閉">×</button>
    </div>
    <form id="ownerForm">
      <div class="field">
        <label for="ownerName">負責人姓名 *</label>
        <input id="ownerName" required maxlength="60" placeholder="例如：李小姐">
        <div class="hint">新增後，所有登入裝置都能使用這位負責人。</div>
      </div>
      <div class="owner-list" id="ownerList"></div>
      <div class="form-actions">
        <button class="secondary" type="button" id="cancelOwnerDialog">取消</button>
        <button class="primary" type="submit">新增負責人</button>
      </div>
    </form>
  </dialog>

  <div class="toast" id="toast" role="status"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL = "https://pcilnctgithigwbsmfye.supabase.co";
    const SUPABASE_PUBLISHABLE_KEY = "sb_publishable_if3I39kVWgYw6mD3UGmbvg_xe4m636M";
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_PUBLISHABLE_KEY);
    const statuses = ["未開始", "進行中", "維護中", "已完成"];
    const statusClasses = {
      "未開始": "status-not-started",
      "進行中": "status-in-progress",
      "維護中": "status-maintenance",
      "已完成": "status-completed"
    };

    const $ = (selector) => document.querySelector(selector);
    const dialog = $("#projectDialog");
    const ownerDialog = $("#ownerDialog");
    const form = $("#projectForm");
    let projects = [];
    let owners = [];
    let realtimeChannel = null;
    let activeUserId = null;

    function formatDateTime(value) {
      if (!value) return "—";
      return new Intl.DateTimeFormat("zh-TW", {
        year: "numeric", month: "2-digit", day: "2-digit",
        hour: "2-digit", minute: "2-digit", hour12: false
      }).format(new Date(value));
    }

    function formatDate(value) {
      if (!value) return "—";
      return new Intl.DateTimeFormat("zh-TW", {
        year: "numeric", month: "2-digit", day: "2-digit"
      }).format(new Date(value + "T00:00:00"));
    }

    function escapeHtml(value = "") {
      return value.replace(/[&<>"']/g, char => ({
        "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#039;"
      })[char]);
    }

    function showToast(message) {
      const toast = $("#toast");
      toast.textContent = message;
      toast.classList.add("show");
      clearTimeout(showToast.timer);
      showToast.timer = setTimeout(() => toast.classList.remove("show"), 1800);
    }

    function render() {
      const query = $("#searchInput").value.trim().toLowerCase();
      const filter = $("#statusFilter").value;
      const ownerFilter = $("#ownerFilter").value;
      const visible = projects
        .filter(project => !filter || project.status === filter)
        .filter(project => !ownerFilter || project.owner === ownerFilter)
        .filter(project => {
          const text = [project.name, project.owner, project.project_data, project.notes].join(" ").toLowerCase();
          return !query || text.includes(query);
        })
        .sort((a, b) => b.updated_at.localeCompare(a.updated_at));

      $("#projectRows").innerHTML = visible.map(project => `
        <tr>
          <td>${escapeHtml(formatDateTime(project.updated_at))}</td>
          <td><div class="project-name">${escapeHtml(project.name)}</div></td>
          <td>${escapeHtml(project.owner)}</td>
          <td><div class="cell-text" title="${escapeHtml(project.project_data)}">${escapeHtml(project.project_data)}</div></td>
          <td>${formatDate(project.due_date)}</td>
          <td><div class="cell-text" title="${escapeHtml(project.notes)}">${escapeHtml(project.notes || "—")}</div></td>
          <td>
            <select class="status-select ${statusClasses[project.status]}" data-status-id="${project.id}" aria-label="更新 ${escapeHtml(project.name)} 的狀態">
              ${statuses.map(status => `<option ${status === project.status ? "selected" : ""}>${status}</option>`).join("")}
            </select>
          </td>
          <td>
            <div class="actions">
              <button class="icon-button" data-edit-id="${project.id}">編輯</button>
              <button class="icon-button danger" data-delete-id="${project.id}">刪除</button>
            </div>
          </td>
        </tr>
      `).join("");

      $("#emptyState").style.display = visible.length ? "none" : "block";
      $("#totalCount").textContent = projects.length;
      $("#progressCount").textContent = projects.filter(p => p.status === "進行中").length;
      $("#maintenanceCount").textContent = projects.filter(p => p.status === "維護中").length;
      $("#completedCount").textContent = projects.filter(p => p.status === "已完成").length;
    }

    function renderOwners() {
      const projectOwnerNames = projects.map(project => project.owner).filter(Boolean);
      const names = [...new Set([...owners.map(owner => owner.name), ...projectOwnerNames])]
        .sort((a, b) => a.localeCompare(b, "zh-Hant"));
      const currentFilter = $("#ownerFilter").value;
      const currentOwner = $("#owner").value;

      $("#ownerFilter").innerHTML = [
        '<option value="">全部負責人</option>',
        ...names.map(name => `<option value="${escapeHtml(name)}">${escapeHtml(name)}</option>`)
      ].join("");
      $("#owner").innerHTML = [
        '<option value="">請選擇負責人</option>',
        ...names.map(name => `<option value="${escapeHtml(name)}">${escapeHtml(name)}</option>`)
      ].join("");
      $("#ownerList").innerHTML = names.length
        ? names.map(name => `<span class="owner-chip">${escapeHtml(name)}</span>`).join("")
        : '<span class="hint">尚未新增負責人</span>';

      if (names.includes(currentFilter)) $("#ownerFilter").value = currentFilter;
      if (names.includes(currentOwner)) $("#owner").value = currentOwner;
    }

    async function loadOwners() {
      const { data, error } = await supabaseClient
        .from("project_owners")
        .select("*")
        .order("name", { ascending: true });
      if (error) {
        owners = [];
        if (error.code !== "PGRST205" && error.code !== "42P01") {
          showToast(`負責人名單讀取失敗：${error.message}`);
        }
      } else {
        owners = data || [];
      }
      renderOwners();
    }

    async function loadProjects() {
      $("#loadingState").classList.add("show");
      const { data, error } = await supabaseClient
        .from("projects")
        .select("*")
        .order("updated_at", { ascending: false });
      $("#loadingState").classList.remove("show");
      if (error) {
        showToast(`讀取失敗：${error.message}`);
        return;
      }
      projects = data || [];
      renderOwners();
      render();
    }

    function startRealtime() {
      if (realtimeChannel) supabaseClient.removeChannel(realtimeChannel);
      realtimeChannel = supabaseClient
        .channel("projects-sync")
        .on("postgres_changes", {
          event: "*",
          schema: "public",
          table: "projects"
        }, () => loadProjects())
        .on("postgres_changes", {
          event: "*",
          schema: "public",
          table: "project_owners"
        }, () => loadOwners())
        .subscribe();
    }

    async function showApp(session) {
      $("#loginScreen").hidden = true;
      $("#userEmail").textContent = session.user.email || "使用者";
      if (activeUserId === session.user.id) return;
      activeUserId = session.user.id;
      await loadProjects();
      await loadOwners();
      startRealtime();
    }

    function showLogin() {
      projects = [];
      owners = [];
      activeUserId = null;
      render();
      $("#loginScreen").hidden = false;
      $("#userEmail").textContent = "";
      if (realtimeChannel) {
        supabaseClient.removeChannel(realtimeChannel);
        realtimeChannel = null;
      }
    }

    function openCreateDialog() {
      form.reset();
      $("#projectId").value = "";
      $("#dialogTitle").textContent = "新增專案";
      $("#status").value = "未開始";
      dialog.showModal();
      $("#projectName").focus();
    }

    function openEditDialog(id) {
      const project = projects.find(item => item.id === id);
      if (!project) return;
      $("#projectId").value = project.id;
      $("#projectName").value = project.name;
      $("#owner").value = project.owner;
      $("#projectData").value = project.project_data;
      $("#dueDate").value = project.due_date;
      $("#notes").value = project.notes;
      $("#status").value = project.status;
      $("#dialogTitle").textContent = "編輯專案";
      dialog.showModal();
    }

    function closeDialog() {
      dialog.close();
      form.reset();
    }

    $("#addProject").addEventListener("click", openCreateDialog);
    $("#addOwner").addEventListener("click", () => {
      $("#ownerForm").reset();
      renderOwners();
      ownerDialog.showModal();
      $("#ownerName").focus();
    });
    $("#closeOwnerDialog").addEventListener("click", () => ownerDialog.close());
    $("#cancelOwnerDialog").addEventListener("click", () => ownerDialog.close());
    $("#logoutButton").addEventListener("click", async () => {
      await supabaseClient.auth.signOut();
      showLogin();
    });
    $("#closeDialog").addEventListener("click", closeDialog);
    $("#cancelDialog").addEventListener("click", closeDialog);
    $("#searchInput").addEventListener("input", render);
    $("#statusFilter").addEventListener("change", render);
    $("#ownerFilter").addEventListener("change", render);

    dialog.addEventListener("click", event => {
      if (event.target === dialog) closeDialog();
    });
    ownerDialog.addEventListener("click", event => {
      if (event.target === ownerDialog) ownerDialog.close();
    });

    $("#ownerForm").addEventListener("submit", async event => {
      event.preventDefault();
      const name = $("#ownerName").value.trim();
      if (!name) return;
      const { error } = await supabaseClient.from("project_owners").insert({ name });
      if (error) {
        const message = error.code === "23505"
          ? "這位負責人已經存在"
          : `新增失敗：${error.message}。請先在 Supabase 執行 project-owners.sql。`;
        showToast(message);
        return;
      }
      await loadOwners();
      $("#owner").value = name;
      ownerDialog.close();
      showToast(`已新增負責人「${name}」`);
    });

    $("#loginForm").addEventListener("submit", async event => {
      event.preventDefault();
      const button = $("#loginButton");
      button.disabled = true;
      button.textContent = "登入中...";
      $("#loginError").textContent = "";
      const { data, error } = await supabaseClient.auth.signInWithPassword({
        email: $("#loginEmail").value.trim(),
        password: $("#loginPassword").value
      });
      button.disabled = false;
      button.textContent = "登入";
      if (error) {
        $("#loginError").textContent = `登入失敗：${error.message}`;
        return;
      }
      $("#loginForm").reset();
      await showApp(data.session);
    });

    form.addEventListener("submit", async event => {
      event.preventDefault();
      const id = $("#projectId").value;
      const entry = {
        name: $("#projectName").value.trim(),
        owner: $("#owner").value,
        project_data: $("#projectData").value.trim(),
        due_date: $("#dueDate").value,
        notes: $("#notes").value.trim(),
        status: $("#status").value,
        updated_at: new Date().toISOString()
      };

      let error;
      if (id) {
        ({ error } = await supabaseClient.from("projects").update(entry).eq("id", id));
      } else {
        ({ error } = await supabaseClient.from("projects").insert(entry));
      }
      if (error) {
        showToast(`儲存失敗：${error.message}`);
        return;
      }
      closeDialog();
      await loadProjects();
      showToast(id ? "專案已更新" : "專案已建立");
    });

    $("#projectRows").addEventListener("change", async event => {
      const select = event.target.closest("[data-status-id]");
      if (!select) return;
      const project = projects.find(item => item.id === select.dataset.statusId);
      if (!project) return;
      const { error } = await supabaseClient
        .from("projects")
        .update({ status: select.value, updated_at: new Date().toISOString() })
        .eq("id", project.id);
      if (error) {
        showToast(`更新失敗：${error.message}`);
        await loadProjects();
        return;
      }
      await loadProjects();
      showToast(`狀態已更新為「${select.value}」`);
    });

    $("#projectRows").addEventListener("click", async event => {
      const editButton = event.target.closest("[data-edit-id]");
      const deleteButton = event.target.closest("[data-delete-id]");
      if (editButton) openEditDialog(editButton.dataset.editId);
      if (deleteButton) {
        const project = projects.find(item => item.id === deleteButton.dataset.deleteId);
        if (project && confirm(`確定要刪除「${project.name}」嗎？`)) {
          const { error } = await supabaseClient.from("projects").delete().eq("id", project.id);
          if (error) {
            showToast(`刪除失敗：${error.message}`);
            return;
          }
          await loadProjects();
          showToast("專案已刪除");
        }
      }
    });

    supabaseClient.auth.onAuthStateChange((event, session) => {
      setTimeout(() => {
        if (event === "SIGNED_OUT") showLogin();
        if (event === "SIGNED_IN" && session) showApp(session);
      }, 0);
    });

    (async function initialize() {
      render();
      const { data: { session } } = await supabaseClient.auth.getSession();
      if (session) await showApp(session);
      else showLogin();
    })();
  </script>
</body>
</html>
